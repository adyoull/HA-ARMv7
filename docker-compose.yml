services:
  homeassistant:
    image: ha-armv7:latest
    container_name: homeassistant
    restart: unless-stopped
    # host networking is required for discovery (mDNS, SSDP, HomeKit, Matter...)
    network_mode: host
    privileged: true
    volumes:
      - ./config:/config
      - /run/dbus:/run/dbus:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/London
    # Uncomment for Zigbee/Z-Wave USB sticks:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
